

# ─────────────────────────────────────────────────────────────────────────────
# EduImpact AI Manager v1 — Docker Compose
# Services: Django, Celery Worker, Celery Beat, Redis, PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: eduimpact_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-eduimpact_db}
      POSTGRES_USER: ${DB_USER:-eduimpact_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-eduimpact_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eduimpact_net

  # ── Redis (Celery Broker + Result Backend) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eduimpact_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - eduimpact_net

  # ── Django Application Server ─────────────────────────────────────────────
  web:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: eduimpact_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - ../backend:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
      - logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduimpact_net

  # ── Celery Worker (executes tasks) ────────────────────────────────────────
  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: eduimpact_celery_worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=4 --queues=default,high_priority
    volumes:
      - ../backend:/app
      - media_files:/app/media
      - logs:/app/logs
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eduimpact_net

  # ── Celery Beat (task scheduler) ──────────────────────────────────────────
  celery_beat:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: eduimpact_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ../backend:/app
      - logs:/app/logs
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - eduimpact_net

  # ── Celery Flower (task monitor — optional dev tool) ──────────────────────
  flower:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    container_name: eduimpact_flower
    restart: unless-stopped
    command: celery -A config flower --port=5555 --basic_auth=admin:eduimpact2024
    ports:
      - "5555:5555"
    env_file:
      - ../.env
    depends_on:
      - redis
    networks:
      - eduimpact_net
    profiles:
      - monitoring  # Start with: docker compose --profile monitoring up

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
  logs:

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  eduimpact_net:
    driver: bridge
